{% extends "layout.html" %}

{% block content_col %}col-12 col-lg-10 col-xl-9 position-relative{% endblock %}

{% block content %}
<div class="sticky-share-bar d-flex flex-md-column gap-3 justify-content-center align-items-center">
    <button class="share-btn" title="Share on Twitter">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.005 4.15H5.059z"/></svg>
    </button>
    <button class="share-btn" title="Share on LinkedIn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
    </button>
    <button class="share-btn" title="Copy Link" onclick="navigator.clipboard.writeText(window.location.href); alert('Link copied!')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
    </button>
</div>

<article class="content-section py-4 px-3 px-md-5 mb-5 shadow-none border-0 bg-transparent">
  <div class="d-flex align-items-center gap-3 mb-4 border-bottom pb-4" style="border-color: var(--color-border-light) !important;">
    <img class="rounded-circle flex-shrink-0"
         src="{{ post.author.image_path }}"
         alt="{{ post.author.username }} profile"
         style="width: 48px; height: 48px; object-fit: cover;">
    <div>
      <a class="text-decoration-none fw-bold"
         href="{{ url_for('user_posts', user_id=post.author.id) }}"
         style="color: var(--color-text-heading);">
         {{ post.author.username }}
      </a>
      <div class="text-muted" style="font-size: 0.95rem;">
        <span title="Published">{{ post.created_at.strftime("%b %d, %Y") }}</span>
      </div>
    </div>
  </div>

  <h1 class="article-title mb-5 fw-bolder" style="font-size: 2.8rem; letter-spacing: -0.02em; line-height: 1.15;">{{ post.title }}</h1>

  <div class="article-content markdown-content"
       data-markdown="{{ post.content_without_title }}">
  </div>
</article>
{% endblock content %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // Configure marked to use highlight.js
    marked.setOptions({
        highlight: function(code, lang) {
            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
            return hljs.highlight(code, { language }).value;
        },
        langPrefix: 'hljs language-'
    });

    document.querySelectorAll('.markdown-content').forEach(el => {
        let md = el.getAttribute('data-markdown') || el.textContent;
        md = md.replace(/\]\(images\//g, '](/images/');
        el.innerHTML = marked.parse(md);
    });
});
</script>
{% endblock scripts %}

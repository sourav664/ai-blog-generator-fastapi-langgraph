llm:


  llm-config:
    LLM_PROVIDER: "openai"
    IMAGE_PROVIDER: "openai-image"
    IMAGE_QUALITY: "low"
  
  groq:
    provider: "groq"
    model_name: "deepseek-r1-distill-llama-70b"
    temperature: 0
    max_output_tokens: 8192

  google:
    provider: "google"
    model_name: "gemini-2.5-flash"
    temperature: 0
    max_output_tokens: 8192

  openai:
     provider: "openai"
     model_name: "gpt-4o"
     temperature: 0
     max_output_tokens: 16000

  openai-image:
     provider: "openai"
     model_name: "gpt-image-2"
     

  google-image:
     provider: "google"
     model_name: "gemini-2.5-flash-image"


  